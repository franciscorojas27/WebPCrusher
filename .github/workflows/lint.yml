name: Go Linting

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true 
      - name: Install C dependencies
        run: sudo apt-get update && sudo apt-get install -y libwebp-dev gcc

      - name: Install Go Dependencies
        run: |
          go mod tidy
          go get github.com/chai2010/webp

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          args: --timeout=5m --issues-exit-code=1
        env:
          CGO_ENABLED: 1