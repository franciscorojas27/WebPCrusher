
name: Create Release
permissions:
  contents: write

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.2.3)'
        required: false

jobs:
  create_release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine tag
        id: get_tag
        shell: powershell
        run: |
          if ($env:GITHUB_REF -and $env:GITHUB_REF -like 'refs/tags/*') {
            $tag = $env:GITHUB_REF -replace 'refs/tags/', ''
          } else {
            $tag = '${{ github.event.inputs.tag }}'
          }
          Add-Content -Path $env:GITHUB_OUTPUT -Value "tag=$tag"

      - name: Create GitHub release (using gh CLI)
        id: create_release_cli
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.get_tag.outputs.tag }}
        run: |
          choco install gh -y
          Write-Output $env:GITHUB_TOKEN | gh auth login --with-token
          gh release create $env:TAG --title "Release $env:TAG" --notes "Release created by workflow for tag $env:TAG"

      - name: Setup MSYS2 (mingw64) and install dependencies
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: |
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-libwebp

      - name: Build Windows executable (with MSYS2 toolchain)
        shell: bash
        run: |
          export PATH="/c/msys64/mingw64/bin:$PATH"
          export CC="x86_64-w64-mingw32-gcc"
          GOOS=windows GOARCH=amd64 CGO_ENABLED=1 go build -ldflags "-s -w" -o WebpCrusher.exe

      - name: Upload Windows exe to release (using gh)
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.get_tag.outputs.tag }}
        run: |
          Write-Output $env:GITHUB_TOKEN | gh auth login --with-token
          gh release upload $env:TAG ./WebpCrusher.exe --clobber
